<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />

    <!-- Google Font Lato -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&family=Miranda+Sans:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Payment System</title>
  </head>
  <body>
    <!-- Heading + Logo -->
    <div class="main-box">
      <div class="first-box">
        <div class="logo-heading">
          <h4>Neutralite</h4>
          <h1>Upgrade to plus</h1>
          <p>Upgrade today and take your AI Productivity to the next level</p>
        </div>

        <!-- Billing -->
        <div class="billing">
          <label>Billed to</label>
          <input type="text" placeholder="Enter first and Last name" />
        </div>

        <!-- Payment Details-->
        <div class="payment-details">
          <div>
            <i class="fa-solid fa-credit-card"></i>

            <h5 class="Credits">Credit</h5>
          </div>

          <div>
            <i class="fa-solid fa-building-columns"></i>
            <h5 class="Bank-transfer">Bank Transfer</h5>
          </div>

          <div>
            <i class="fa-solid fa-coins"></i>
            <h5 class="">Points</h5>
          </div>
        </div>

        <!-- Personal data -->
        <div class="email">
          <label>Email Address</label>
          <input type="text" placeholder="Enter Email Address" />
        </div>

        <div class="row">
          <div class="form-group">
            <label>Country</label>

            <select>
              <option>Finland</option>
            </select>
          </div>

          <div class="form-group">
            <label>Postal Code</label>

            <input type="text" placeholder="00270" />
          </div>
        </div>

        <div class="button-group">
          <button class="cancel-btn">Cancel</button>

          <button class="subscribe-btn">Subscribe</button>
        </div>
      </div>

      <div class="second-box">
        <!-- Pricing -->
        <div class="pricing-summary">
          <div class="plan-option active">
            <input type="radio" />

            <div>
              <h4>Pay monthly</h4>
              <p>$20 / Month / Member</p>
            </div>
          </div>
        </div>

        <div class="plan-option">
          <input type="radio" />

          <div>
            <h4>Pay Annual</h4>
            <p>$16 / Month / Member</p>
          </div>
        </div>

        <div class="total">
          <div class="total-word">
            <h3>Total</h3>
          </div>

          <div class="months">
            <h2>$20 / Month</h2>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
